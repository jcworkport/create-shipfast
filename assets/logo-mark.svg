<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="10" fill="#111111"/>

  <!-- Long yellow streaks -->
  <line x1="32" y1="32" x2="55" y2="12" stroke="#FACC15" stroke-width="2"   stroke-linecap="round"/>
  <line x1="32" y1="32" x2="42" y2="6"  stroke="#FACC15" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="60" y2="26" stroke="#FACC15" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="18" y2="56" stroke="#FACC15" stroke-width="2"   stroke-linecap="round"/>
  <line x1="32" y1="32" x2="52" y2="52" stroke="#FACC15" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Long blue streaks -->
  <line x1="32" y1="32" x2="14" y2="12" stroke="#3B82F6" stroke-width="2"   stroke-linecap="round"/>
  <line x1="32" y1="32" x2="6"  y2="38" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="38" y2="58" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="58" y2="44" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Short bright sparks -->
  <line x1="32" y1="32" x2="46" y2="20" stroke="#FACC15" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="20" y2="22" stroke="#FACC15" stroke-width="2"   stroke-linecap="round"/>
  <line x1="32" y1="32" x2="10" y2="24" stroke="#3B82F6" stroke-width="2"   stroke-linecap="round"/>
  <line x1="32" y1="32" x2="22" y2="46" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cooling droplets at streak tips -->
  <circle cx="55" cy="12" r="1.5" fill="#FACC15"/>
  <circle cx="42" cy="6"  r="1"   fill="#FDE68A"/>
  <circle cx="14" cy="12" r="1.5" fill="#3B82F6"/>
  <circle cx="60" cy="26" r="1"   fill="#FDE68A"/>
  <circle cx="52" cy="52" r="1.5" fill="#FACC15"/>
  <circle cx="38" cy="58" r="1.5" fill="#60A5FA"/>
  <circle cx="6"  cy="38" r="1"   fill="#3B82F6"/>

  <!-- Scattered floating dots (forge spatter) -->
  <circle cx="50" cy="8"  r="1"   fill="#FACC15"/>
  <circle cx="10" cy="16" r="1"   fill="#60A5FA"/>
  <circle cx="56" cy="48" r="1"   fill="#FDE68A"/>
  <circle cx="16" cy="52" r="1"   fill="#3B82F6"/>

  <!-- Hot core -->
  <circle cx="32" cy="32" r="3.5" fill="#FACC15"/>
  <circle cx="32" cy="32" r="2"   fill="#FFFFFF"/>
</svg>
